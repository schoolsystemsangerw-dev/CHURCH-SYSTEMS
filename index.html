<!-- Parish Management Section -->
<div id="parish-module" class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Parish & Matrimony Portal</h2>
    <span class="badge bg-primary">Parish Records</span>
  </div>

  <!-- Quick Action Navigation -->
  <ul class="nav nav-tabs mb-4" id="parishTabs" role="tablist">
    <li class="nav-item">
      <button class="nav-link active" id="matrimony-tab" data-bs-toggle="tab" data-bs-target="#matrimony" type="button">Matrimony Requests</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" id="parishioners-tab" data-bs-toggle="tab" data-bs-target="#parishioners" type="button">Parishioner Directory</button>
    </li>
  </ul>

  <div class="tab-content" id="parishTabsContent">
    <!-- Matrimony Application Tab -->
    <div class="tab-pane fade show active" id="matrimony" role="tabpanel">
      <div class="card shadow-sm p-4">
        <h4 class="card-title mb-4 text-center border-bottom pb-2">Register New Matrimony Application</h4>
        <form id="matrimonyForm">
          
          <div class="row g-4">
            
            <!-- GROOM SECTION -->
            <div class="col-md-6 border-end">
              <h5 class="text-primary mb-3"><i class="bi bi-person-fill"></i> Groom Information</h5>
              
              <!-- Large Groom Photo Box -->
              <div class="photo-box text-center p-3 mb-3 border rounded bg-light" style="min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <img id="groomPreview" src="https://via.placeholder.com/150" alt="Groom Photo" class="img-thumbnail mb-2" style="max-height: 140px; object-fit: cover;">
                <div>
                  <label for="groomPhotoInput" class="btn btn-sm btn-outline-primary me-1">
                    <i class="bi bi-upload"></i> Upload
                  </label>
                  <input type="file" id="groomPhotoInput" accept="image/*" class="d-none" onchange="previewPhoto(event, 'groomPreview')">
                  
                  <button type="button" class="btn btn-sm btn-outline-secondary" onclick="openCamera('groomPreview')">
                    <i class="bi bi-camera"></i> Camera
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label font-weight-bold">Groom's Full Name</label>
                <input type="text" id="groomName" class="form-control" placeholder="e.g. Jean de Dieu" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Groom's Phone Number</label>
                <input type="tel" id="groomPhone" class="form-control" placeholder="+250 788 000 000" required>
              </div>
            </div>

            <!-- BRIDE SECTION -->
            <div class="col-md-6">
              <h5 class="text-danger mb-3"><i class="bi bi-person-heart"></i> Bride Information</h5>
              
              <!-- Large Bride Photo Box -->
              <div class="photo-box text-center p-3 mb-3 border rounded bg-light" style="min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <img id="bridePreview" src="https://via.placeholder.com/150" alt="Bride Photo" class="img-thumbnail mb-2" style="max-height: 140px; object-fit: cover;">
                <div>
                  <label for="bridePhotoInput" class="btn btn-sm btn-outline-danger me-1">
                    <i class="bi bi-upload"></i> Upload
                  </label>
                  <input type="file" id="bridePhotoInput" accept="image/*" class="d-none" onchange="previewPhoto(event, 'bridePreview')">
                  
                  <button type="button" class="btn btn-sm btn-outline-secondary" onclick="openCamera('bridePreview')">
                    <i class="bi bi-camera"></i> Camera
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label font-weight-bold">Bride's Full Name</label>
                <input type="text" id="brideName" class="form-control" placeholder="e.g. Marie Claire" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Bride's Phone Number</label>
                <input type="tel" id="bridePhone" class="form-control" placeholder="+250 788 000 000" required>
              </div>
            </div>

            <hr class="my-4">

            <!-- CHURCH STRUCTURE & DETAILS (IKANISA) -->
            <div class="col-12">
              <h5 class="text-dark mb-3"><i class="bi bi-building"></i> Church Structure & Marriage Details (Ikanisa)</h5>
            </div>

            <div class="col-md-4">
              <label class="form-label">Church Name / Parish (Ikanisa)</label>
              <input type="text" id="churchName" class="form-control" placeholder="e.g. St. Michel Parish" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Sub-Parish / Local Christian Community (Santurali / Umuryango Remezo)</label>
              <input type="text" id="churchStructure" class="form-control" placeholder="e.g. St. Joseph Outstation" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Proposed Wedding Date</label>
              <input type="date" id="weddingDate" class="form-control" required>
            </div>

            <div class="col-12 mt-4 text-center">
              <button type="submit" class="btn btn-success btn-lg px-5">Save Matrimony Record</button>
            </div>

          </div>
        </form>
      </div>
    </div>

    <!-- Directory Tab -->
    <div class="tab-pane fade" id="parishioners" role="tabpanel">
      <div class="card shadow-sm p-4">
        <h4>Registered Matrimony Applications</h4>
        <div class="table-responsive mt-3">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>Groom Photo</th>
                <th>Bride Photo</th>
                <th>Groom & Bride</th>
                <th>Church (Ikanisa)</th>
                <th>Wedding Date</th>
                <th>Contact</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="parishRecordsTable">
              <!-- Dynamically rendered rows -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>
