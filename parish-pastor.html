<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parish Pastor Dashboard - EAR Rwanda</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase JS Client CDN (Required to define window.supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

  <!-- Dashboard Container -->
  <div class="max-w-7xl mx-auto p-4 sm:p-6 space-y-6">
    
    <!-- Header Section -->
    <header class="bg-indigo-950 text-white p-6 rounded-2xl shadow-md flex flex-col sm:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-xl sm:text-2xl font-black uppercase tracking-wider">Parish Pastor Dashboard</h1>
        <p class="text-xs text-indigo-300">EAR Rwanda — Mukama Parish Management System</p>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-xs bg-indigo-900 text-indigo-200 px-3 py-1.5 rounded-lg border border-indigo-800 font-mono">Live Sync Active</span>
      </div>
    </header>

    <!-- Stats Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
        <p class="text-[10px] font-bold text-slate-400 uppercase">Total Applications</p>
        <p id="statTotal" class="text-2xl font-black text-indigo-950 mt-1">0</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
        <p class="text-[10px] font-bold text-amber-600 uppercase">Pending Review</p>
        <p id="statPending" class="text-2xl font-black text-amber-600 mt-1">0</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
        <p class="text-[10px] font-bold text-emerald-600 uppercase">Approved</p>
        <p id="statApproved" class="text-2xl font-black text-emerald-600 mt-1">0</p>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
        <p class="text-[10px] font-bold text-slate-400 uppercase">Registered Members</p>
        <p id="statMembers" class="text-2xl font-black text-indigo-950 mt-1">0</p>
      </div>
    </div>

    <!-- Controls / Filters Section -->
    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="w-full sm:w-72">
        <input type="text" id="searchInput" oninput="filterApplications()" placeholder="Search by name, code, phone, NID..." class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-900">
      </div>
      <div class="w-full sm:w-auto flex items-center gap-3">
        <label for="statusFilter" class="text-xs font-bold text-slate-600">Status:</label>
        <select id="statusFilter" onchange="filterApplications()" class="px-3 py-2 border border-slate-300 rounded-lg text-xs bg-white font-medium focus:outline-none focus:ring-2 focus:ring-indigo-900">
          <option value="ALL">All Statuses</option>
          <option value="PENDING">Pending</option>
          <option value="APPROVED">Approved</option>
          <option value="REJECTED">Rejected</option>
        </select>
      </div>
    </div>

    <!-- Main Table Section -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse text-xs">
          <thead>
            <tr class="bg-slate-100 text-slate-600 uppercase text-[10px] font-bold tracking-wider border-b border-slate-200">
              <th class="p-3">Reference / Date</th>
              <th class="p-3">Church</th>
              <th class="p-3">Groom Details</th>
              <th class="p-3">Bride Details</th>
              <th class="p-3">Witnesses</th>
              <th class="p-3 text-center">Status</th>
              <th class="p-3 text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="applicationsTableBody" class="divide-y divide-slate-100">
            <!-- Dynamically populated via JS -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- View Details Modal -->
  <div id="matrimonyDetailsModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-xl rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[90vh]">
      <div class="bg-indigo-950 text-white px-6 py-4 flex justify-between items-center">
        <h3 class="font-bold text-sm uppercase tracking-wider">Matrimony Application Details</h3>
        <button onclick="closeMatrimonyDetailsModal()" class="text-indigo-300 hover:text-white font-bold text-lg cursor-pointer">&times;</button>
      </div>
      
      <div id="matrimonyDetailsContent" class="p-6 overflow-y-auto space-y-4 text-xs">
        <!-- Dynamically populated details -->
      </div>

      <div class="bg-slate-50 px-6 py-3 border-t border-slate-200 flex justify-between items-center">
        <button onclick="printMatrimonyReport()" class="px-4 py-2 bg-indigo-900 hover:bg-indigo-950 text-white font-bold rounded-lg text-xs transition cursor-pointer">🖨️ Print Official Report</button>
        <button onclick="closeMatrimonyDetailsModal()" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-lg text-xs transition cursor-pointer">Close</button>
      </div>
    </div>
  </div>

  <!-- Dashboard JavaScript Logic Connected to Supabase -->
  <script>
    // Initialize Supabase Client
    const SUPABASE_URL = 'https://ggrcjxqfmdkzkvipubhd.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_sZnQimLXEoAzSlb5Adw6oQ_P2QW9_cq';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let applications = [];
    let registeredMembers = [];
    let currentSelectedMember = null;
    let currentSelectedApp = null;

    async function fetchApplications() {
      try {
        const { data, error } = await supabaseClient
          .from('matrimony_applications')
          .select('*');

        if (error) {
          console.error('Error fetching applications:', error);
          return;
        }

        if (data) {
          applications = data.map(item => ({
            id: item.ref_code || item.id || 'EAR-2026-00X',
            date: item.submission_date || item.created_at?.split('T')[0] || '2026-07-23',
            local_church: item.local_church || item.church || 'Mukama Local Church',
            status: item.status || 'PENDING',
            groom: item.groom || { name: item.groom_name, nid: item.groom_nid, phone: item.groom_phone },
            bride: item.bride || { name: item.bride_name, nid: item.bride_nid, phone: item.bride_phone },
            witnesses: item.witnesses || [],
            sender_photo_url: item.sender_photo_url || '',
            phone_number: item.phone_number || '',
            geo_location: item.geo_location || '',
            dob_sender: item.dob_sender || '',
            dob_other_party: item.dob_other_party || '',
            urwego_rwitorero: item.urwego_rwitorero || ''
          }));
        }
        updateStats();
        filterApplications();
      } catch (err) {
        console.error('Unexpected error fetching applications:', err);
      }
    }

    async function fetchMembers() {
      try {
        const { data, error } = await supabaseClient
          .from('members') 
          .select('*');

        if (error) {
          console.error('Error fetching members:', error);
          return;
        }

        if (data) {
          registeredMembers = data.map((m, index) => ({
            id: m.id || `MEM-00${index + 1}`,
            name: m.name || m.full_name,
            nid: m.nid || m.national_id,
            phone: m.phone,
            kanisa: m.kanisa || m.local_church,
            baptised: !!m.baptised,
            watebweAmaboko: !!(m.watebweAmaboko || m.confirmed),
            wasezeranye: !!(m.wasezeranye || m.married)
          }));
        }
        updateStats();
      } catch (err) {
        console.error('Unexpected error fetching members:', err);
      }
    }

    function updateStats() {
      document.getElementById('statTotal').innerText = applications.length;
      document.getElementById('statPending').innerText = applications.filter(a => a.status.toLowerCase() === 'pending').length;
      document.getElementById('statApproved').innerText = applications.filter(a => a.status.toLowerCase() === 'approved').length;
      document.getElementById('statMembers').innerText = registeredMembers.length;
    }

    function filterApplications() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const statusVal = document.getElementById('statusFilter').value;

      const filtered = applications.filter(app => {
        let matchesStatus = (statusVal === 'ALL' || app.status.toUpperCase() === statusVal);
        let matchesQuery = 
          app.id.toLowerCase().includes(query) ||
          app.local_church.toLowerCase().includes(query) ||
          app.phone_number.toLowerCase().includes(query) ||
          app.urwego_rwitorero.toLowerCase().includes(query) ||
          (app.groom?.name && app.groom.name.toLowerCase().includes(query)) ||
          (app.groom?.phone && app.groom.phone.toLowerCase().includes(query)) ||
          (app.bride?.name && app.bride.name.toLowerCase().includes(query)) ||
          (app.bride?.phone && app.bride.phone.toLowerCase().includes(query)) ||
          (app.groom?.nid && app.groom.nid.toLowerCase().includes(query)) ||
          (app.bride?.nid && app.bride.nid.toLowerCase().includes(query));

        return matchesStatus && matchesQuery;
      });

      renderTable(filtered);
    }

    function renderTable(dataToRender) {
      const tbody = document.getElementById('applicationsTableBody');
      tbody.innerHTML = '';

      if (dataToRender.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-6 text-center text-slate-400 font-medium">No matrimony applications found.</td></tr>`;
        return;
      }

      dataToRender.forEach((app) => {
        let statusLower = app.status ? app.status.toLowerCase() : 'pending';
        let statusBadge = '';
        if (statusLower === 'pending') statusBadge = '<span class="bg-amber-100 text-amber-800 px-2.5 py-1 rounded-full font-bold">Pending</span>';
        else if (statusLower === 'approved') statusBadge = '<span class="bg-emerald-100 text-emerald-800 px-2.5 py-1 rounded-full font-bold">Approved</span>';
        else statusBadge = '<span class="bg-rose-100 text-rose-800 px-2.5 py-1 rounded-full font-bold">Rejected</span>';

        let witnessesHtml = Array.isArray(app.witnesses) 
          ? app.witnesses.map((w, i) => `<span class="block text-[10px] text-slate-600">${i+1}. ${w.name} (${w.phone})</span>`).join('')
          : '<span class="text-[10px] text-slate-400">No witnesses listed</span>';

        let groomName = app.groom?.name || 'N/A';
        let groomNid = app.groom?.nid || 'N/A';
        let groomPhone = app.groom?.phone || 'N/A';

        let brideName = app.bride?.name || 'N/A';
        let brideNid = app.bride?.nid || 'N/A';
        let bridePhone = app.bride?.phone || 'N/A';

        tbody.innerHTML += `
          <tr class="hover:bg-slate-50/80 transition">
            <td class="p-3 font-mono font-bold text-indigo-950">${app.id}<br/><span class="text-[10px] text-slate-400 font-normal">${app.date}</span></td>
            <td class="p-3 font-semibold text-slate-700">${app.local_church}<br/><span class="text-[10px] text-indigo-600">${app.urwego_rwitorero || ''}</span></td>
            <td class="p-3">
              <span class="font-bold text-slate-800">${groomName}</span><br/>
              <span class="font-mono text-[10px] text-slate-500">NID: ${groomNid}</span><br/>
              <span class="font-mono text-[10px] text-indigo-600 font-bold">📞 ${groomPhone}</span>
            </td>
            <td class="p-3">
              <span class="font-bold text-slate-800">${brideName}</span><br/>
              <span class="font-mono text-[10px] text-slate-500">NID: ${brideNid}</span><br/>
              <span class="font-mono text-[10px] text-indigo-600 font-bold">📞 ${bridePhone}</span>
            </td>
            <td class="p-3">${witnessesHtml}</td>
            <td class="p-3 text-center">${statusBadge}</td>
            <td class="p-3 text-center space-y-1">
              <button onclick="updateAppStatus('${app.id}', 'Approved')" class="px-2 py-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded text-[10px] transition cursor-pointer">Approve</button>
              <button onclick="updateAppStatus('${app.id}', 'Rejected')" class="px-2 py-1 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded text-[10px] transition cursor-pointer">Reject</button>
              <button onclick="viewMatrimonyDetails('${app.id}')" class="block w-full px-2 py-1 bg-indigo-900 hover:bg-indigo-950 text-white font-bold rounded text-[10px] transition cursor-pointer mt-1">👁️ View</button>
            </td>
          </tr>
        `;
      });
    }

    async function updateAppStatus(refCode, newStatus) {
      try {
        const { error } = await supabaseClient
          .from('matrimony_applications')
          .update({ status: newStatus })
          .eq('ref_code', refCode);

        if (error) {
          alert('Failed to update application status on Supabase.');
          console.error(error);
          return;
        }

        const app = applications.find(a => a.id === refCode);
        if (app) {
          app.status = newStatus;
          updateStats();
          filterApplications();
          alert(`Application ${refCode} status updated to ${newStatus}`);
        }
      } catch (err) {
        console.error('Error updating status:', err);
      }
    }

    function viewMatrimonyDetails(appId) {
      const app = applications.find(a => a.id === appId);
      if (!app) return;

      currentSelectedApp = app;

      let witnessesListHtml = Array.isArray(app.witnesses) && app.witnesses.length > 0
        ? app.witnesses.map((w, i) => `<li class="py-1">${i+1}. <strong>${w.name}</strong> — Phone: <span class="font-mono text-indigo-600">${w.phone}</span></li>`).join('')
        : '<p class="text-slate-400">No witnesses listed.</p>';

      let photoHtml = app.sender_photo_url 
        ? `<div class="mb-4 text-center"><img src="${app.sender_photo_url}" alt="Applicant Photo" class="h-28 w-28 object-cover rounded-full mx-auto border-2 border-indigo-900 shadow" /></div>` 
        : '';

      const detailsContainer = document.getElementById('matrimonyDetailsContent');
      detailsContainer.innerHTML = `
        ${photoHtml}
        <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 flex justify-between items-center">
          <div>
            <span class="text-[10px] font-bold text-indigo-600 uppercase">Application Reference</span>
            <h4 class="text-base font-black font-mono text-indigo-950">${app.id}</h4>
          </div>
          <div class="text-right">
            <span class="text-[10px] font-bold text-slate-400 uppercase">Submission Date</span>
            <p class="text-xs font-bold text-slate-700">${app.date}</p>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Local Church</p>
            <p class="text-sm font-extrabold text-slate-800">${app.local_church}</p>
          </div>
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Urwego rw'itorero</p>
            <p class="text-sm font-extrabold text-indigo-950">${app.urwego_rwitorero || 'N/A'}</p>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-1">
            <p class="text-[10px] font-bold text-indigo-900 uppercase">Groom Information</p>
            <p class="text-xs font-extrabold text-slate-800">${app.groom?.name || 'N/A'}</p>
            <p class="font-mono text-[11px] text-slate-600">NID: ${app.groom?.nid || 'N/A'}</p>
            <p class="font-mono text-[11px] text-indigo-600 font-bold">Phone: ${app.groom?.phone || 'N/A'}</p>
            <p class="font-mono text-[11px] text-slate-500">DOB: ${app.dob_sender || 'N/A'}</p>
          </div>
          <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-1">
            <p class="text-[10px] font-bold text-indigo-900 uppercase">Bride Information</p>
            <p class="text-xs font-extrabold text-slate-800">${app.bride?.name || 'N/A'}</p>
            <p class="font-mono text-[11px] text-slate-600">NID: ${app.bride?.nid || 'N/A'}</p>
            <p class="font-mono text-[11px] text-indigo-600 font-bold">Phone: ${app.bride?.phone || 'N/A'}</p>
            <p class="font-mono text-[11px] text-slate-500">DOB: ${app.dob_other_party || 'N/A'}</p>
          </div>
        </div>

        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase">Contact Phone</p>
            <p class="text-xs font-mono font-bold text-indigo-900">${app.phone_number || 'N/A'}</p>
          </div>
          <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase">Geo-Location</p>
            <p class="text-xs font-mono text-slate-700">${app.geo_location || 'N/A'}</p>
          </div>
        </div>

        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
          <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Witnesses</p>
          <ul class="list-disc list-inside space-y-1 text-slate-700">
            ${witnessesListHtml}
          </ul>
        </div>
      `;

      document.getElementById('matrimonyDetailsModal').classList.remove('hidden');
    }

    function closeMatrimonyDetailsModal() {
      document.getElementById('matrimonyDetailsModal').classList.add('hidden');
    }

    function printMatrimonyReport() {
      if (!currentSelectedApp) return;
      let app = currentSelectedApp;

      let witnessesPrintHtml = Array.isArray(app.witnesses) && app.witnesses.length > 0
        ? app.witnesses.map((w, i) => `<div class="row"><span class="label">Witness ${i+1}</span><span class="val">${w.name} (${w.phone})</span></div>`).join('')
        : '<div class="row"><span class="label">Witnesses</span><span class="val">None listed</span></div>';

      let html = `<!DOCTYPE html>
      <html>
      <head>
        <title>Matrimony Application - ${app.id}</title>
        <style>
          body { font-family: sans-serif; padding: 30px; color: #333; }
          h2 { text-align: center; color: #1e1b4b; text-transform: uppercase; margin-bottom: 5px; }
          p.subtitle { text-align: center; font-size: 12px; color: #666; margin-bottom: 25px; }
          .card { border: 1px solid #cbd5e1; padding: 20px; border-radius: 8px; max-width: 600px; margin: 0 auto; }
          .row { margin-bottom: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; }
          .label { font-size: 10px; font-weight: bold; color: #64748b; text-transform: uppercase; }
          .val { font-size: 14px; font-weight: bold; color: #1e293b; text-align: right; }
        </style>
      </head>
      <body>
        <h2>EAR Rwanda - Mukama Parish</h2>
        <p class="subtitle">Official Matrimony Application Details - Ref: ${app.id}</p>
        <div class="card">
          <div class="row"><span class="label">Application Reference</span><span class="val">${app.id}</span></div>
          <div class="row"><span class="label">Submission Date</span><span class="val">${app.date}</span></div>
          <div class="row"><span class="label">Local Church</span><span class="val">${app.local_church}</span></div>
          <div class="row"><span class="label">Urwego rw'itorero</span><span class="val">${app.urwego_rwitorero || 'N/A'}</span></div>
          <div class="row"><span class="label">Status</span><span class="val">${app.status}</span></div>
          <div class="row"><span class="label">Contact Phone</span><span class="val">${app.phone_number || 'N/A'}</span></div>
          <div class="row"><span class="label">Groom Name & DOB</span><span class="val">${app.groom?.name || 'N/A'} (${app.dob_sender || 'N/A'})</span></div>
          <div class="row"><span class="label">Groom NID / Phone</span><span class="val">${app.groom?.nid || 'N/A'} / ${app.groom?.phone || 'N/A'}</span></div>
          <div class="row"><span class="label">Bride Name & DOB</span><span class="val">${app.bride?.name || 'N/A'} (${app.dob_other_party || 'N/A'})</span></div>
          <div class="row"><span class="label">Bride NID / Phone</span><span class="val">${app.bride?.nid || 'N/A'} / ${app.bride?.phone || 'N/A'}</span></div>
          <div class="row"><span class="label">Geo-Location</span><span class="val">${app.geo_location || 'N/A'}</span></div>
          ${witnessesPrintHtml}
        </div>
      </body>
      </html>`;

      let win = window.open('', '', 'height=700,width=800');
      win.document.write(html);
      win.document.close();
      win.focus();
      setTimeout(() => { win.print(); }, 500);
    }

    // Auto-load data on page start
    window.addEventListener('DOMContentLoaded', () => {
      fetchApplications();
      fetchMembers();
    });
  </script>
</body>
</html>
